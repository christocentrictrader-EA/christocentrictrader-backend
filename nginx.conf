# /etc/nginx/sites-available/christocentrictrader
# Nginx config for christocentrictrader.d9thprofithub.com.ng
#
# Steps to enable:
#   sudo ln -s /etc/nginx/sites-available/christocentrictrader \
#              /etc/nginx/sites-enabled/christocentrictrader
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name christocentrictrader.d9thprofithub.com.ng;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name christocentrictrader.d9thprofithub.com.ng;

    # ── SSL (Let's Encrypt — certbot fills these in) ────────────────
    ssl_certificate     /etc/letsencrypt/live/christocentrictrader.d9thprofithub.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/christocentrictrader.d9thprofithub.com.ng/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Proxy to Node.js app ────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 6M;   # slightly above multer 5MB limit
    }

    # Block direct access to uploads directory
    location /uploads {
        deny all;
        return 403;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
